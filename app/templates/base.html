<!DOCTYPE html>
<html lang="{{ lang }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ title or t["app.title"] }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
      }
      body {
        background: #f6f7fb;
        font-family: "Manrope", "Segoe UI", sans-serif;
      }
      .card {
        border: 1px solid #e7e8f0;
        box-shadow: 0 10px 30px rgba(22, 24, 40, 0.06);
      }
      .page-title {
        letter-spacing: -0.02em;
      }
      .section-title {
        font-size: 0.95rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #6b7280;
      }
      .form-hint {
        font-size: 0.85rem;
        color: #6b7280;
      }
      .nav-link {
        color: #111827;
      }
      .nav-link.active {
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/{{ lang }}/users/">{{ t["app.title"] }}</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/{{ lang }}/users/">{{ t["nav.home"] }}</a>
            {% if nav_user %}
            <a class="nav-link" href="/{{ lang }}/users/profile">{{ t["nav.profile"] }}</a>
            <form method="post" action="/{{ lang }}/users/auth/logout" class="d-flex align-items-center ms-lg-2">
              <button class="nav-link bg-transparent border-0 p-0" type="submit">{{ t["auth.logout"] }}</button>
            </form>
            {% else %}
            <a class="nav-link" href="/{{ lang }}/users/auth">{{ t["nav.auth"] }}</a>
            <a class="nav-link" href="/{{ lang }}/users/register">{{ t["nav.register"] }}</a>
            {% endif %}
            <div class="nav-item d-flex align-items-center ms-lg-2">
              <a class="nav-link" href="/ru{{ request.url.path[3:] }}">{{ t["nav.lang.ru"] }}</a>
              <a class="nav-link" href="/en{{ request.url.path[3:] }}">{{ t["nav.lang.en"] }}</a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <main class="container py-4">
      {% if message %}
      <div class="alert alert-info">{{ message }}</div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
